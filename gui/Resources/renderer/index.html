<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Starlee Library</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div id="root" class="root">
      <canvas id="pixel-dither-background" aria-hidden="true"></canvas>
      <main class="library-shell" aria-label="Starlee Library">
        <section class="hero-strip">
          <div>
            <h1>Library</h1>
          </div>
          <div class="status-pill" id="status-pill">Starlee</div>
        </section>

        <section class="tool-row" aria-label="Library tools">
          <label class="search-shell">
            <span aria-hidden="true">/</span>
            <input id="search-input" type="search" placeholder="Search saved articles, videos, notes">
          </label>
        </section>

        <section class="shelf-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Recent captures</p>
              <h2 id="month-heading">This shelf</h2>
            </div>
            <p id="result-count" class="count-label">0 items</p>
          </div>
          <div id="card-row" class="card-row" aria-live="polite"></div>
          <p id="empty-state" class="empty-state" hidden>No captures match this search.</p>
        </section>
      </main>
    </div>
    <script src="./pixel-dither-background.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
