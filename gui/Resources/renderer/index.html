<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Starlee Library</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div id="root" class="root">
      <canvas id="pixel-dither-background" aria-hidden="true"></canvas>
      <main class="library-shell" aria-label="Starlee Library">
        <section class="library-header" aria-label="Library tools">
          <div class="title-box">
            <h1>Library</h1>
          </div>
          <div class="library-actions">
            <button id="edit-toggle" class="action-btn" type="button" aria-pressed="false" title="Edit mode: delete captures">Edit</button>
          </div>
          <label class="search-shell">
            <span aria-hidden="true">/</span>
            <input id="search-input" type="search" placeholder="Search saved articles, videos, notes">
          </label>
        </section>

        <section class="shelf-section">
          <div id="card-row" class="card-row" aria-live="polite"></div>
          <p id="empty-state" class="empty-state" hidden>No captures match this search.</p>
        </section>
      </main>

      <div id="reader" class="reader" hidden role="dialog" aria-modal="true" aria-labelledby="reader-title">
        <div class="reader-backdrop" data-reader-dismiss></div>
        <div class="reader-panel" role="document">
          <header class="reader-head">
            <div class="reader-titles">
              <h2 id="reader-title"></h2>
              <p id="reader-meta" class="reader-meta"></p>
              <div id="reader-topics" class="reader-topics"></div>
            </div>
            <button id="reader-close" class="reader-close" type="button" aria-label="Close reader" data-reader-dismiss>✕</button>
          </header>
          <div id="reader-actions" class="reader-actions"></div>
          <div id="reader-body" class="reader-body" tabindex="0"></div>
        </div>
      </div>
    </div>
    <script src="./pixel-dither-background.js"></script>
    <script src="./flow-background.js"></script>
    <script src="./aurora-background.js"></script>
    <script src="./dither-background.js"></script>
    <script src="./glass-background.js"></script>
    <script src="./background-suite.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
